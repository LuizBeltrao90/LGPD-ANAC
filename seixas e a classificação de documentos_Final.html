<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANAC - Classificação de Documentos no SEI</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:"Comic Neue", Arial, sans-serif;
  background:#eef2f6;
  margin:0;
  padding:0;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* TOPO */
.cover{
  width:100%;
  max-width:1260px;
  background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  text-align:center;
  padding:30px 20px 25px;
  position:relative;
  border-bottom:6px solid #e63946;
}

.cover::before{
  content:"";
  position:absolute;
  inset:0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 40px,
    rgba(255,255,255,0.02) 40px,
    rgba(255,255,255,0.02) 80px
  );
}

.cover-badge{
  display:inline-block;
  background:#e63946;
  color:#fff;
  font-family:'Bangers', cursive;
  font-size:0.8rem;
  letter-spacing:4px;
  padding:4px 18px;
  border-radius:4px;
  margin-bottom:10px;
  border:2px solid #fff;
}

.cover-title{
  font-family:'Bangers', cursive;
  font-size:3.2rem;
  color:#fff;
  letter-spacing:4px;
  line-height:1;
  text-shadow:4px 4px 0 #e63946, 6px 6px 0 rgba(0,0,0,0.4);
}

/* GRID */
.comic-container{
  max-width:1260px;
  width:100%;
  background:#fff;
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:12px;
  padding:14px;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.panel{
  border:3px solid #1e3c57;
  border-radius:6px;
  overflow:hidden;
  background:#f8fbff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:380px;
}

.panel img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* RODAPÉ */
.footer-banner{
  max-width:1260px;
  width:100%;
  background:#0b3d6d;
  color:#fff;
  text-align:center;
  padding:16px 20px;
  border-radius:0 0 8px 8px;
  font-size:18px;
  font-weight:600;
}

.hashtag{
  margin-top:6px;
  font-size:14px;
  color:#a9d4ff;
}

@media (max-width: 980px){
  .comic-container{
    grid-template-columns:1fr;
  }

  .panel{
    height:auto;
  }

  .panel img{
    height:auto;
    object-fit:contain;
  }

  .cover-title{
    font-size:2.2rem;
  }
}
</style>
</head>

<body>

<div class="cover">
  <div class="cover-badge">ANAC · CAMPANHA INSTITUCIONAL</div>
  <div class="cover-title">
    CLASSIFICAÇÃO DE DOCUMENTOS NO SEI
  </div>
</div>

<div class="comic-container">
  <div class="panel"><img src="1 Cartilha SEI.png"></div>
  <div class="panel"><img src="2 Cartilha SEI.png"></div>
  <div class="panel"><img src="3 Cartilha SEI.png"></div>

  <div class="panel"><img src="4 Cartilha SEI.png"></div>
  <div class="panel"><img src="5 Cartilha SEI.png"></div>
  <div class="panel"><img src="6 Cartilha SEI.png"></div>

  <div class="panel"><img src="7 Cartilha SEI.png"></div>
  <div class="panel"><img src="8 Cartilha SEI.png"></div>
  <div class="panel"><img src="9 Cartilha SEI.png"></div>
</div>

<div class="footer-banner">
  Proteção de dados e classificação correta da informação fortalecem a transparência e a segurança institucional.
  <div class="hashtag">#Proteja • Campanha ANAC</div>
</div>

</body>
</html>
